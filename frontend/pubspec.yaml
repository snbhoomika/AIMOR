name: aimor_frontend
description: "AIMOR - AI-based Missing Object Recovery (Lost & Found System)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.3

  # UI Components
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2

  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.8
  flutter_local_notifications: ^16.3.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.3
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.1

  # Code Generation
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

